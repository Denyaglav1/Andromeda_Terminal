worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;

    server {
        listen 80;
        # Define a DNS resolver for Nginx
        resolver 10.96.128.2 valid=300s;
        resolver_timeout 5s;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}